services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      - database
    volumes:
      - ./backend:/app
      - /app/node_modules # <-- This prevents the crash!
    environment:
      - NODE_ENV=development

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules # <-- This prevents the crash!
    environment:
      - NODE_ENV=development

  database:
    image: postgres:13
    environment:
      POSTGRES_DB: inventory_order_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: